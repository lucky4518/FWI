<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FWI Prediction</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Animated background circles */
        body::before, body::after {
            content: "";
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            filter: blur(100px);
        }

        body::before {
            top: -100px;
            left: -100px;
        }

        body::after {
            bottom: -100px;
            right: -100px;
        }

        .container {
            width: 420px;
            padding: 35px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            text-align: center;
            color: white;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 28px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            outline: none;
            font-size: 14px;
            background: rgba(255,255,255,0.2);
            color: white;
        }

        input::placeholder {
            color: #ddd;
        }

        input:focus {
            background: rgba(255,255,255,0.3);
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(45deg, #ff7eb3, #ff758c);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        .result {
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
            background: rgba(0,0,0,0.3);
            font-size: 18px;
        }
    </style>
</head>

<body>

<div class="container">
    <h1> FWI Prediction</h1>

    <form action="{{ url_for('predict_datapoint') }}" method="post">
        <input type="text" name="Temperature" placeholder="🌡 Temperature" required />
        <input type="text" name="RH" placeholder="💧 Humidity (RH)" required />
        <input type="text" name="Ws" placeholder="🌬 Wind Speed" required />
        <input type="text" name="Rain" placeholder="🌧 Rain" required />
        <input type="text" name="FFMC" placeholder="🔥 FFMC" required />
        <input type="text" name="DMC" placeholder="🌿 DMC" required />
        <input type="text" name="ISI" placeholder="⚡ ISI" required />
        <input type="text" name="Classes" placeholder="📊 Classes" required />
        <input type="text" name="Region" placeholder="🌍 Region" required />

        <button type="submit">Predict Now</button>
    </form>

    {% if results %}
    <div class="result">
        🔥 Prediction: {{ results }}
    </div>
    {% endif %}
</div>

</body>
</html>
